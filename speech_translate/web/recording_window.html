<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Speech Translate Rev - 录制会话</title>
  <style>
    :root {
      --bg: #060b14;
      --card: #101a2a;
      --line: #1f3758;
      --accent: #53f2d3;
      --text: #eaf1ff;
      --muted: #95a8c9;
      --warn: #ffd166;
      --danger: #ff5d73;
    }

    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      color: var(--text);
      background: radial-gradient(circle at 10% 0%, #1c2f4d, var(--bg) 45%);
      overflow: hidden;
    }

    .shell {
      display: grid;
      grid-template-rows: auto auto 1fr auto;
      gap: 10px;
      padding: 14px;
      height: 100%;
    }

    .head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
    }

    .title {
      font-size: 16px;
      font-weight: 700;
      letter-spacing: 0.2px;
    }

    .dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: var(--accent);
      box-shadow: 0 0 12px var(--accent);
      animation: pulse 1s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 0.55; transform: scale(0.9); }
      50% { opacity: 1; transform: scale(1.15); }
    }

    .status {
      background: rgba(16, 26, 42, 0.85);
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 10px 12px;
      font-size: 14px;
      min-height: 44px;
      display: flex;
      align-items: center;
    }

    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }

    .item {
      background: rgba(16, 26, 42, 0.85);
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 8px 10px;
    }

    .k {
      font-size: 11px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.4px;
      margin-bottom: 4px;
    }

    .v {
      font-size: 13px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .actions {
      display: flex;
      justify-content: flex-end;
      gap: 8px;
      margin-top: 2px;
    }

    button {
      border: 1px solid var(--line);
      background: #13233a;
      color: var(--text);
      border-radius: 10px;
      padding: 8px 12px;
      font-weight: 600;
      cursor: pointer;
    }

    button:hover {
      border-color: #2b4f81;
    }

    .danger {
      border-color: #7b2a38;
      background: #3a1620;
      color: #ffd9df;
    }

    .danger:hover {
      border-color: #a1394d;
    }
  </style>
</head>
<body>
  <div class="shell">
    <div class="head">
      <div class="title">录制会话</div>
      <div class="dot" aria-hidden="true"></div>
    </div>

    <div class="status" id="status">等待录制状态...</div>

    <div class="grid">
      <div class="item"><div class="k">输入</div><div class="v" id="device">-</div></div>
      <div class="item"><div class="k">模式</div><div class="v" id="mode">-</div></div>
      <div class="item"><div class="k">源语言</div><div class="v" id="lang-source">-</div></div>
      <div class="item"><div class="k">目标语言</div><div class="v" id="lang-target">-</div></div>
      <div class="item"><div class="k">引擎</div><div class="v" id="engine">-</div></div>
      <div class="item"><div class="k">计时</div><div class="v" id="timer">00:00:00</div></div>
      <div class="item"><div class="k">缓冲</div><div class="v" id="buffer">0 / 0 秒</div></div>
      <div class="item"><div class="k">句子数</div><div class="v" id="sentences">0</div></div>
    </div>

    <div class="actions">
      <button id="stop-btn" class="danger">停止录制</button>
    </div>
  </div>

  <script>
    const statusEl = document.getElementById('status');
    const map = {
      device: document.getElementById('device'),
      mode: document.getElementById('mode'),
      langSource: document.getElementById('lang-source'),
      langTarget: document.getElementById('lang-target'),
      engine: document.getElementById('engine'),
      timer: document.getElementById('timer'),
      buffer: document.getElementById('buffer'),
      sentences: document.getElementById('sentences'),
    };

    function setText(el, value, fallback = '-') {
      el.textContent = value ?? fallback;
    }

    function update(payload) {
      if (!payload) return;
      setText(statusEl, payload.status, '等待录制状态...');
      setText(map.device, payload.device);
      setText(map.mode, payload.mode);
      setText(map.langSource, payload.lang_source);
      setText(map.langTarget, payload.lang_target);
      setText(map.engine, payload.engine);
      setText(map.timer, payload.timer, '00:00:00');
      setText(map.buffer, payload.buffer, '0 / 0 秒');
      setText(map.sentences, payload.sentences, '0');
    }

    function startPolling() {
      syncFromBackend();
      setInterval(syncFromBackend, 500);
    }

    async function syncFromBackend() {
      try {
        if (!window.pywebview || !window.pywebview.api || !window.pywebview.api.get_recording_state) {
          return;
        }
        const payload = await window.pywebview.api.get_recording_state();
        update(payload || {});
      } catch (error) {
        console.debug('Failed to sync recording state', error);
      }
    }

    window.addEventListener('message', (event) => {
      if (event?.data?.type !== 'update-recording') return;
      update(event.data.payload || {});
    });

    window.addEventListener('pywebviewready', startPolling);

    setTimeout(startPolling, 300);

    const channel = typeof BroadcastChannel !== 'undefined'
      ? new BroadcastChannel('speechtranslate-recording')
      : null;

    if (channel) {
      channel.onmessage = (event) => {
        const msg = event?.data;
        if (!msg || msg.type !== 'recording-state') {
          return;
        }
        update(msg.payload || {});
      };
    }

    document.getElementById('stop-btn').addEventListener('click', async () => {
      const btn = document.getElementById('stop-btn');
      btn.disabled = true;
      btn.textContent = '正在停止...';
      try {
        if (channel) {
          channel.postMessage({ type: 'recording-stop-request' });
          statusEl.textContent = '正在停止...';
        } else {
          statusEl.textContent = '通道不可用，请在主窗口点击停止';
          btn.disabled = false;
          btn.textContent = '停止录制';
        }
      } catch (error) {
        console.error('Failed to stop recording', error);
        statusEl.textContent = '停止失败，请在主窗口点击停止';
        btn.disabled = false;
        btn.textContent = '停止录制';
      }
    });
  </script>
</body>
</html>
