<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>托盘菜单</title>
  <style>
    :root {
      color-scheme: light;
      font-family: "Microsoft YaHei UI", "Segoe UI", sans-serif;
      --menu-bg: rgba(255, 255, 255, 0.985);
      --menu-border: rgba(214, 222, 234, 0.96);
      --text: #16233a;
      --hover: #f4f7fb;
      --hover-primary: #eef4ff;
      --danger: #c53b32;
      --separator: rgba(226, 232, 240, 0.92);
    }

    * {
      box-sizing: border-box;
      -webkit-font-smoothing: antialiased;
    }

    html,
    body {
      margin: 0;
      width: 100%;
      height: 100%;
      background: transparent;
      overflow: hidden;
    }

    body {
      padding: 0;
      color: var(--text);
    }

    .tray-menu {
      width: 100%;
      height: 100%;
      padding: 3px;
      border-radius: 7px;
      border: 0;
      background: var(--menu-bg);
      box-shadow: inset 0 0 0 1px var(--menu-border);
      display: grid;
      grid-auto-rows: min-content;
      gap: 1px;
      overflow: hidden;
    }

    .menu-separator {
      height: 1px;
      margin: 2px 6px;
      background: var(--separator);
    }

    .menu-item {
      width: 100%;
      min-height: 28px;
      padding: 0 7px;
      border: 0;
      border-radius: 5px;
      background: transparent;
      color: inherit;
      font: 400 11.5px/1.1 "Microsoft YaHei UI", "Segoe UI", sans-serif;
      display: grid;
      grid-template-columns: 18px 1fr;
      align-items: center;
      gap: 7px;
      text-align: left;
      cursor: pointer;
      transition: background-color 120ms ease, color 120ms ease;
    }

    .menu-item:hover {
      background: var(--hover);
    }

    .menu-item.primary:hover {
      background: var(--hover-primary);
    }

    .menu-item.danger {
      color: var(--danger);
    }

    .menu-item.danger:hover {
      background: rgba(255, 241, 241, 0.98);
    }

    .menu-icon {
      width: 18px;
      height: 18px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      color: currentColor;
    }

    .menu-item.primary .menu-icon {
      color: #2957c8;
    }

    .menu-label {
      min-width: 0;
      white-space: nowrap;
    }

    svg {
      width: 16px;
      height: 16px;
      stroke: currentColor;
      stroke-width: 1.7;
      stroke-linecap: round;
      stroke-linejoin: round;
      fill: none;
    }
  </style>
</head>

<body>
  <main class="tray-menu" role="menu" aria-label="Speech Translate Rev 托盘菜单">
    <button type="button" class="menu-item primary" data-action="show-app">
      <span class="menu-icon" aria-hidden="true">
        <svg viewBox="0 0 20 20">
          <rect x="3" y="4" width="14" height="12" rx="2"></rect>
          <path d="M7 16V18"></path>
          <path d="M13 16V18"></path>
          <path d="M6 8H14"></path>
        </svg>
      </span>
      <span class="menu-label">打开主窗口</span>
    </button>

    <div class="menu-separator" aria-hidden="true"></div>

    <button type="button" class="menu-item" data-action="open-model">
      <span class="menu-icon" aria-hidden="true">
        <svg viewBox="0 0 20 20">
          <path d="M4 6.5 10 3l6 3.5-6 3-6-3Z"></path>
          <path d="M4 6.5V13.5L10 17l6-3.5V6.5"></path>
          <path d="M10 9.5V17"></path>
        </svg>
      </span>
      <span class="menu-label">模型目录</span>
    </button>

    <button type="button" class="menu-item" data-action="open-export">
      <span class="menu-icon" aria-hidden="true">
        <svg viewBox="0 0 20 20">
          <path d="M10 3V11"></path>
          <path d="M7 8 10 11 13 8"></path>
          <path d="M4 13.5V15a2 2 0 0 0 2 2h8a2 2 0 0 0 2-2v-1.5"></path>
        </svg>
      </span>
      <span class="menu-label">导出目录</span>
    </button>

    <button type="button" class="menu-item" data-action="open-log">
      <span class="menu-icon" aria-hidden="true">
        <svg viewBox="0 0 20 20">
          <path d="M5 4h7l3 3v9a1.5 1.5 0 0 1-1.5 1.5h-8A1.5 1.5 0 0 1 4 16V5.5A1.5 1.5 0 0 1 5.5 4Z"></path>
          <path d="M12 4v3h3"></path>
          <path d="M7 10h6"></path>
          <path d="M7 13h4"></path>
        </svg>
      </span>
      <span class="menu-label">日志目录</span>
    </button>

    <div class="menu-separator" aria-hidden="true"></div>

    <button type="button" class="menu-item danger" data-action="quit-app">
      <span class="menu-icon" aria-hidden="true">
        <svg viewBox="0 0 20 20">
          <path d="M10 3v8"></path>
          <path d="M6.2 5.4a7 7 0 1 0 7.6 0"></path>
        </svg>
      </span>
      <span class="menu-label">退出程序</span>
    </button>
  </main>

  <script>
    async function callTray(action) {
      if (typeof pywebview === 'undefined' || !pywebview.api) {
        return;
      }
      if (action === 'show-app') {
        await pywebview.api.show_app();
      } else if (action === 'open-model') {
        await pywebview.api.open_directory('model');
      } else if (action === 'open-export') {
        await pywebview.api.open_directory('export');
      } else if (action === 'open-log') {
        await pywebview.api.open_directory('log');
      } else if (action === 'quit-app') {
        await pywebview.api.quit_app();
      } else if (action === 'hide-panel') {
        await pywebview.api.hide_panel();
      }
    }

    document.addEventListener('click', async (event) => {
      const target = event.target.closest('[data-action]');
      if (!target) {
        return;
      }
      await callTray(target.dataset.action);
    });

    document.addEventListener('keydown', async (event) => {
      if (event.key === 'Escape') {
        await callTray('hide-panel');
      }
    });
  </script>
</body>

</html>
