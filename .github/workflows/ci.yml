name: CI

on:
  workflow_dispatch:
  push:
    branches: [main, "codex/**"]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Python ${{ matrix.python-version }} on Windows
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.14"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip

      - name: Check JavaScript syntax
        run: node --check speech_translate/web/app.js

      - name: Check Python syntax
        run: python -m py_compile Run.py speech_translate/__main__.py speech_translate/webview_app.py speech_translate/web_bridge_api.py speech_translate/app_runtime.py speech_translate/recording_controller.py speech_translate/model_manager.py

      - name: Run core unit tests
        run: python -m unittest test.app_tray_test test.app_startup_controller_test test.web_ui_preview_sync_test test.web_settings_contract_test test.runtime_registry_test
