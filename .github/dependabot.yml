version: 2
updates:
  - package-ecosystem: github-actions
    directory: /
    open-pull-requests-limit: 2
    schedule:
      interval: weekly
    groups:
      github-actions:
        patterns:
          - "*"
    labels:
      - dependencies
      - ci

  - package-ecosystem: pip
    directory: /
    open-pull-requests-limit: 3
    schedule:
      interval: weekly
    groups:
      python-runtime:
        patterns:
          - "*"
        exclude-patterns:
          - torch
          - torchaudio
          - faster-whisper
          - stable-ts
          - demucs
          - onnxruntime
    ignore:
      - dependency-name: torch
        update-types:
          - version-update:semver-major
          - version-update:semver-minor
      - dependency-name: torchaudio
        update-types:
          - version-update:semver-major
          - version-update:semver-minor
      - dependency-name: faster-whisper
        update-types:
          - version-update:semver-major
          - version-update:semver-minor
      - dependency-name: stable-ts
        update-types:
          - version-update:semver-major
      - dependency-name: demucs
        update-types:
          - version-update:semver-major
          - version-update:semver-minor
      - dependency-name: onnxruntime
        update-types:
          - version-update:semver-major
          - version-update:semver-minor
    labels:
      - dependencies
      - python
