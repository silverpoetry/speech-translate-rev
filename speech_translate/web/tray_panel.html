<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>托盘面板</title>
  <style>
    :root {
      color-scheme: light;
      font-family: "Segoe UI Variable Text", "Segoe UI", "PingFang SC", "Microsoft YaHei UI", sans-serif;
      --bg: #f7fafc;
      --panel: rgba(255, 255, 255, 0.96);
      --panel-soft: rgba(244, 247, 251, 0.98);
      --line: rgba(148, 163, 184, 0.18);
      --text: #10203a;
      --muted: #667892;
      --primary: #2456d6;
      --primary-soft: #dfeaff;
      --danger: #c53a31;
      --shadow: 0 14px 34px rgba(15, 23, 42, 0.14);
    }

    * {
      box-sizing: border-box;
      -webkit-font-smoothing: antialiased;
    }

    html,
    body {
      margin: 0;
      width: 100%;
      height: 100%;
      background: var(--bg);
      overflow: hidden;
    }

    body {
      color: var(--text);
    }

    .tray-shell {
      position: relative;
      display: grid;
      grid-template-rows: auto auto 1fr;
      gap: 8px;
      width: 100vw;
      height: 100vh;
      padding: 10px;
      border-radius: 14px;
      background: linear-gradient(180deg, rgba(255, 255, 255, 0.98), rgba(246, 249, 252, 0.98));
      box-shadow: var(--shadow);
      border: 1px solid rgba(220, 228, 239, 0.92);
      overflow: hidden;
    }

    .tray-shell::before {
      content: "";
      position: absolute;
      inset: 0 0 auto 0;
      height: 58px;
      background:
        radial-gradient(circle at 0% 0%, rgba(36, 86, 214, 0.12), transparent 58%),
        linear-gradient(135deg, rgba(255, 255, 255, 0.72), transparent 70%);
      pointer-events: none;
    }

    .tray-head,
    .tray-main,
    .tray-footer {
      position: relative;
      z-index: 1;
    }

    .tray-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
    }

    .tray-title {
      min-width: 0;
      display: grid;
      gap: 3px;
    }

    .tray-kicker {
      display: inline-flex;
      align-items: center;
      width: fit-content;
      min-height: 18px;
      padding: 0 7px;
      border-radius: 999px;
      background: rgba(227, 234, 244, 0.96);
      color: #4c5f7d;
      font-size: 0.58rem;
      font-weight: 800;
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }

    h1 {
      margin: 0;
      font-size: 0.84rem;
      line-height: 1.12;
      font-weight: 700;
    }

    .tray-subtitle {
      margin: 0;
      font-size: 0.62rem;
      line-height: 1.35;
      color: var(--muted);
    }

    .tray-close {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 26px;
      height: 26px;
      padding: 0;
      border: 1px solid rgba(148, 163, 184, 0.14);
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.82);
      color: #475569;
      font-size: 0.95rem;
      cursor: pointer;
      transition: background-color 140ms ease, color 140ms ease;
    }

    .tray-close:hover {
      background: rgba(226, 232, 240, 0.95);
      color: #0f172a;
    }

    .tray-main {
      display: grid;
      gap: 6px;
    }

    .tray-menu {
      display: grid;
      gap: 6px;
    }

    .tray-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      width: 100%;
      min-height: 34px;
      padding: 8px 10px;
      border: 1px solid rgba(220, 228, 239, 0.96);
      border-radius: 10px;
      background: rgba(255, 255, 255, 0.86);
      color: var(--text);
      text-align: left;
      cursor: pointer;
      transition: border-color 140ms ease, background-color 140ms ease, transform 120ms ease;
    }

    .tray-item strong {
      font-size: 0.71rem;
      font-weight: 700;
    }

    .tray-item span {
      font-size: 0.61rem;
      color: var(--muted);
    }

    .tray-item:hover,
    .tray-close:hover {
      transform: translateY(-1px);
    }

    .tray-item:hover {
      border-color: rgba(160, 178, 207, 0.92);
      background: rgba(250, 252, 255, 0.98);
    }

    .tray-item.primary {
      border-color: rgba(126, 167, 255, 0.22);
      background: linear-gradient(135deg, rgba(223, 234, 255, 0.98), rgba(241, 246, 255, 0.98));
      color: var(--primary);
    }

    .tray-item.primary span {
      color: #5f769a;
    }

    .tray-item.danger {
      border-color: rgba(248, 113, 113, 0.2);
      background: linear-gradient(135deg, rgba(255, 240, 240, 0.98), rgba(255, 247, 247, 0.98));
      color: var(--danger);
    }
  </style>
</head>

<body>
  <main class="tray-shell">
    <header class="tray-head">
      <div class="tray-title">
        <div class="tray-kicker">Tray</div>
        <h1>Speech Translate</h1>
        <p class="tray-subtitle">右键打开快捷入口</p>
      </div>
      <button type="button" class="tray-close" id="tray_close" aria-label="关闭">×</button>
    </header>

    <section class="tray-main">
      <div class="tray-menu">
        <button type="button" class="tray-item primary" data-action="show-app">
          <strong>打开主窗口</strong>
          <span>完整界面</span>
        </button>

        <button type="button" class="tray-item" data-action="open-model">
          <strong>模型目录</strong>
          <span>本地模型</span>
        </button>

        <button type="button" class="tray-item" data-action="open-export">
          <strong>导出目录</strong>
          <span>结果输出</span>
        </button>

        <button type="button" class="tray-item" data-action="open-log">
          <strong>日志目录</strong>
          <span>运行日志</span>
        </button>

        <button type="button" class="tray-item" data-action="hide-panel">
          <strong>关闭面板</strong>
          <span>保留托盘</span>
        </button>

        <button type="button" class="tray-item danger" data-action="quit-app">
          <strong>退出程序</strong>
          <span>结束后台</span>
        </button>
      </div>
    </section>
  </main>

  <script>
    async function callTray(action) {
      if (typeof pywebview === 'undefined' || !pywebview.api) {
        return;
      }
      if (action === 'show-app') {
        await pywebview.api.show_app();
      } else if (action === 'open-model') {
        await pywebview.api.open_directory('model');
      } else if (action === 'open-export') {
        await pywebview.api.open_directory('export');
      } else if (action === 'open-log') {
        await pywebview.api.open_directory('log');
      } else if (action === 'quit-app') {
        await pywebview.api.quit_app();
      } else if (action === 'hide-panel') {
        await pywebview.api.hide_panel();
      }
    }

    document.addEventListener('click', async (event) => {
      const target = event.target.closest('[data-action]');
      if (!target) {
        return;
      }
      await callTray(target.dataset.action);
    });

    document.getElementById('tray_close')?.addEventListener('click', async () => {
      await callTray('hide-panel');
    });
  </script>
</body>

</html>
