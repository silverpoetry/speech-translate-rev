name: CI

on:
  workflow_dispatch:
  push:
    branches: [main, "codex/**"]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Python 3.14 on Windows
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Python 3.14
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip

      - name: Check JavaScript syntax
        run: node --check speech_translate/web/app.js

      - name: Check Python syntax
        run: python -m py_compile Run.py speech_translate/__main__.py speech_translate/webview_app.py speech_translate/web_bridge_api.py speech_translate/app_runtime.py speech_translate/recording_controller.py speech_translate/model_manager.py

      - name: Run core unit tests
        run: |
          python -m unittest discover -s test -p app_tray_test.py
          python -m unittest discover -s test -p app_startup_controller_test.py
          python -m unittest discover -s test -p web_ui_preview_sync_test.py
          python -m unittest discover -s test -p web_settings_contract_test.py
          python -m unittest discover -s test -p runtime_registry_test.py
