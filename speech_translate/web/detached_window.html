<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>语音翻译 - 字幕窗口</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --text: #e5e7eb;
      --accent: #6cf4ff;
      --bg-primary: rgba(4, 10, 18, 0.98);
      --bg-secondary: rgba(10, 20, 30, 0.96);
      --border-color: rgba(108, 212, 255, 0.32);
    }

    html, body {
      width: 100%;
      height: 100%;
      background: transparent;
      user-select: none;
      margin: 0;
      padding: 0;
    }

    body {
      display: flex;
      flex-direction: column;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
      font-size: 14px;
      color: var(--text);
      overflow: hidden;
    }

    .window-wrapper {
      width: 100%;
      height: 100%;
      border-radius: 4px;
      border: 1px solid var(--border-color);
      background: linear-gradient(145deg, var(--bg-primary), var(--bg-secondary));
      box-shadow: 
        0 0 32px rgba(108, 212, 255, 0.2),
        inset 0 0 12px rgba(108, 212, 255, 0.08),
        0 8px 32px rgba(0, 0, 0, 0.4);
      display: flex;
      flex-direction: column;
      overflow: hidden;
      cursor: grab;
    }

    .window-wrapper:active {
      cursor: grabbing;
    }

    .content {
      flex: 1;
      padding: 14px;
      overflow-y: auto;
      line-height: 1.6;
      word-wrap: break-word;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      -webkit-app-region: no-drag;
    }

    .lines {
      width: 100%;
    }

    .line {
      margin: 0;
      padding: 0;
      white-space: pre-wrap;
      word-break: break-word;
      color: var(--line-color, inherit);
    }

    .line.latest-line {
      color: var(--latest-line-color, inherit);
      font-weight: 600;
    }

    .content::-webkit-scrollbar {
      width: 8px;
    }

    .content::-webkit-scrollbar-track {
      background: rgba(108, 212, 255, 0.05);
    }

    .content::-webkit-scrollbar-thumb {
      background: rgba(108, 212, 255, 0.2);
      border-radius: 4px;
    }

    .content::-webkit-scrollbar-thumb:hover {
      background: rgba(108, 212, 255, 0.3);
    }

    @media (prefers-color-scheme: dark) {
      html {
        background-color: transparent;
      }
    }
  </style>
</head>
<body>
  <div class="window-wrapper">
    <div class="content" id="window-content">
      内容将显示在这里...
    </div>
  </div>

  <script>
    // Window state
    const state = {
      windowMode: 'tl',
    };

    const dragState = {
      active: false,
      pointerId: null,
      startPointerX: 0,
      startPointerY: 0,
      startWindowX: 0,
      startWindowY: 0,
    };

    // Get parameters from URL
    const params = new URLSearchParams(window.location.search);
    state.windowMode = params.get('mode') || 'tc';

    // Update window title
    const currentTitle = '翻译字幕窗口';
    document.title = `语音翻译 - ${currentTitle}`;
    // Listen for content updates from parent window
    window.addEventListener('message', (e) => {
      if (e.data.type === 'update-content') {
        const content = document.getElementById('window-content');
        const html = e.data.html || '';
        if (state.windowMode === 'tc') {
          content.innerHTML = html || '<div class="lines"><div class="line latest-line">等待更新...</div></div>';
        } else {
          content.innerHTML = renderDisplayHtml(html);
        }
        
        // Auto-scroll to bottom
        content.scrollTop = content.scrollHeight;
      } else if (e.data.type === 'update-config') {
        const config = e.data.config || {};
        applyConfig(config);
      }
    });

    function getWindowPosition() {
      return {
        x: Number(window.screenX ?? window.screenLeft ?? 0),
        y: Number(window.screenY ?? window.screenTop ?? 0),
      };
    }

    function isInteractiveTarget(target) {
      if (!(target instanceof Element)) {
        return false;
      }

      return Boolean(target.closest('button, input, textarea, select, a, [data-no-drag="true"]'));
    }

    async function moveNativeWindow(x, y) {
      const api = window.pywebview && window.pywebview.api;
      if (!api || typeof api.move_detached_window !== 'function') {
        return;
      }

      try {
        await api.move_detached_window(state.windowMode, x, y);
      } catch (_error) {
        // Ignore drag transport errors so the window remains usable.
      }
    }

    function startWindowDrag(event) {
      if (event.button !== 0 || isInteractiveTarget(event.target)) {
        return;
      }

      event.preventDefault();
      dragState.active = true;
      dragState.pointerId = event.pointerId;
      dragState.startPointerX = event.screenX;
      dragState.startPointerY = event.screenY;

      const windowPos = getWindowPosition();
      dragState.startWindowX = windowPos.x;
      dragState.startWindowY = windowPos.y;

      if (event.currentTarget && typeof event.currentTarget.setPointerCapture === 'function') {
        try {
          event.currentTarget.setPointerCapture(event.pointerId);
        } catch (_error) {
          // Pointer capture is optional.
        }
      }

      document.body.classList.add('dragging-window');
    }

    function updateWindowDrag(event) {
      if (!dragState.active || event.pointerId !== dragState.pointerId) {
        return;
      }

      event.preventDefault();
      const deltaX = event.screenX - dragState.startPointerX;
      const deltaY = event.screenY - dragState.startPointerY;
      void moveNativeWindow(Math.round(dragState.startWindowX + deltaX), Math.round(dragState.startWindowY + deltaY));
    }

    function stopWindowDrag(event) {
      if (!dragState.active || event.pointerId !== dragState.pointerId) {
        return;
      }

      dragState.active = false;
      dragState.pointerId = null;
      document.body.classList.remove('dragging-window');
    }

    function bindDragHandlers() {
      const wrapper = document.querySelector('.window-wrapper');
      if (!wrapper) {
        return;
      }

      wrapper.addEventListener('pointerdown', startWindowDrag);
      wrapper.addEventListener('pointermove', updateWindowDrag);
      wrapper.addEventListener('pointerup', stopWindowDrag);
      wrapper.addEventListener('pointercancel', stopWindowDrag);
      wrapper.addEventListener('lostpointercapture', stopWindowDrag);
    }

    bindDragHandlers();

    function escapeHtml(value) {
      return String(value)
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;')
        .replaceAll("'", '&#39;');
    }

    function applyCommaWrapRule(lines) {
      const wrapped = [];
      for (const rawLine of lines) {
        const line = String(rawLine || '').trim();
        if (!line) {
          continue;
        }

        const commaIndex = Math.min(
          ...[line.indexOf('，'), line.indexOf(',')].filter((x) => x >= 0),
        );

        if (Number.isFinite(commaIndex) && commaIndex > 20) {
          const left = line.slice(0, commaIndex + 1).trim();
          const right = line.slice(commaIndex + 1).trim();
          if (left) wrapped.push(left);
          if (right) wrapped.push(right);
        } else {
          wrapped.push(line);
        }
      }
      return wrapped;
    }

    function splitSentenceBoundaries(lines) {
      const output = [];
      for (const rawLine of lines) {
        const line = String(rawLine || '').trim();
        if (!line) {
          continue;
        }

        const sentenceParts = line
          .split(/(?<=[。！？!?\.])\s*/)
          .map((part) => part.trim())
          .filter(Boolean);

        if (sentenceParts.length > 0) {
          output.push(...sentenceParts);
        } else {
          output.push(line);
        }
      }
      return output;
    }

    function toPlainLines(inputHtml) {
      const html = String(inputHtml || '');
      const temp = document.createElement('div');
      temp.innerHTML = html;

      const readText = (node) => String(node?.innerText || node?.textContent || '')
        .replaceAll('\r', '')
        .replaceAll('\n', ' ')
        .trim();

      // 1) Prefer explicit per-line markers.
      const taggedLines = Array.from(temp.querySelectorAll('span[data-st-line]'))
        .map(readText)
        .filter(Boolean);
      if (taggedLines.length > 0) {
        return taggedLines;
      }

      // 2) If separator markers exist, split by marker nodes structurally.
      const hasSep = temp.querySelector('span[data-st-sep]') !== null;
      if (hasSep) {
        const out = [];
        let current = [];
        const flush = () => {
          const line = current.join(' ').split(' ').filter(Boolean).join(' ').trim();
          if (line) out.push(line);
          current = [];
        };

        for (const node of Array.from(temp.childNodes || [])) {
          if (node && node.nodeType === 1) {
            const el = node;
            if (el.matches && el.matches('span[data-st-sep]')) {
              flush();
              continue;
            }
            if (el.matches && el.matches('br')) {
              continue;
            }
          }
          const txt = readText(node);
          if (txt) current.push(txt);
        }
        flush();
        if (out.length > 0) {
          return out;
        }
      }

      // 3) Reuse existing .line wrappers if present.
      const wrappedLines = Array.from(temp.querySelectorAll('.line'))
        .map(readText)
        .filter(Boolean);
      if (wrappedLines.length > 0) {
        return wrappedLines;
      }

      // 4) Fallback: split by rendered newlines, including <br>.
      const withBreaks = html.replace(/<br\s*\/?>/gi, '\n');
      const plain = document.createElement('div');
      plain.innerHTML = withBreaks;
      const text = (plain.innerText || plain.textContent || '').replaceAll('\r', '');
      const lines = text.split('\n').map((x) => x.trim()).filter(Boolean);

      if (lines.length >= 2) {
        const last = String(lines[lines.length - 1] || '').trim();
        const compactLast = last.replaceAll(' ', '');
        const hasPunctuation = /[，。！？；：、,.!?;:]/.test(last);
        if (compactLast.length > 0 && compactLast.length < 5 && !hasPunctuation) {
          const prev = String(lines[lines.length - 2] || '').trim();
          const needSpace = /[A-Za-z0-9]$/.test(prev) && /^[A-Za-z0-9]/.test(last);
          lines[lines.length - 2] = `${prev}${needSpace ? ' ' : ''}${last}`;
          lines.pop();
        }
      }

      return lines;
    }

    function renderDisplayHtml(inputHtml) {
      const lines = toPlainLines(inputHtml);
      if (!lines.length) {
        return '<div class="lines"><div class="line latest-line">等待更新...</div></div>';
      }

      const body = lines.map((line, idx) => {
        const latest = idx === lines.length - 1 ? ' latest-line' : '';
        return `<div class="line${latest}">${escapeHtml(line)}</div>`;
      }).join('');

      return `<div class="lines">${body}</div>`;
    }

    function applyConfig(config) {
      const wrapper = document.querySelector('.window-wrapper');
      const content = document.getElementById('window-content');
      const root = document.documentElement;

      const defaultBackground = 'linear-gradient(145deg, var(--bg-primary), var(--bg-secondary))';
      const defaultBorderColor = 'var(--border-color)';
      const defaultShadow =
        '0 0 32px rgba(108, 212, 255, 0.2), inset 0 0 12px rgba(108, 212, 255, 0.08), 0 8px 32px rgba(0, 0, 0, 0.4)';

      function lightenColor(color, ratio = 0.65) {
        const value = String(color || '').trim();
        if (!value) {
          return '';
        }

        const rgbMatch = value.match(/^#?([0-9a-fA-F]{6})$/);
        if (!rgbMatch) {
          return value;
        }

        const hex = rgbMatch[1];
        const r = parseInt(hex.slice(0, 2), 16);
        const g = parseInt(hex.slice(2, 4), 16);
        const b = parseInt(hex.slice(4, 6), 16);
        const mix = (channel) => Math.round(channel + (255 - channel) * ratio);
        const toHex = (channel) => mix(channel).toString(16).padStart(2, '0');
        return `#${toHex(r)}${toHex(g)}${toHex(b)}`;
      }

      function isTransparentColor(value) {
        const normalized = String(value || '').trim().toLowerCase();
        if (!normalized) {
          return false;
        }
        if (normalized === 'transparent') {
          return true;
        }
        if (normalized === '#0000' || normalized === '#00000000') {
          return true;
        }
        return /^rgba\([^)]*,\s*0(?:\.0+)?\s*\)$/.test(normalized);
      }
      
      // Apply font
      if (config.font) {
        content.style.fontFamily = `"${config.font}", monospace`;
      }
      
      // Apply font size
      if (config.font_size) {
        content.style.fontSize = config.font_size + 'px';
      }
      
      // Apply font bold
      if (config.font_bold !== undefined) {
        content.style.fontWeight = config.font_bold ? 'bold' : 'normal';
      }
      
      // Apply text color for both detached modes. Confidence-colored spans can still
      // override the inherited color when the payload includes explicit segment colors.
      if (config.font_color) {
        content.style.color = config.font_color;
        root.style.setProperty('--line-color', config.font_color);
        root.style.setProperty('--latest-line-color', lightenColor(config.font_color, 0.65));
      } else {
        content.style.color = '';
        root.style.setProperty('--line-color', 'inherit');
        root.style.setProperty('--latest-line-color', 'inherit');
      }
      
      // Apply background color
      if (config.bg_color) {
        if (isTransparentColor(config.bg_color)) {
          wrapper.style.background = 'transparent';
          wrapper.style.borderColor = 'transparent';
          wrapper.style.boxShadow = 'none';
        } else {
          wrapper.style.background = config.bg_color;
          wrapper.style.borderColor = defaultBorderColor;
          wrapper.style.boxShadow = defaultShadow;
        }
      } else {
        wrapper.style.background = defaultBackground;
        wrapper.style.borderColor = defaultBorderColor;
        wrapper.style.boxShadow = defaultShadow;
      }

      // Apply opacity
      if (config.opacity !== undefined) {
        wrapper.style.opacity = config.opacity;
      }
    }

    async function notifyBackendReady() {
      for (let i = 0; i < 100; i += 1) {
        const api = window.pywebview && window.pywebview.api;
        if (api && typeof api.detached_window_ready === 'function') {
          try {
            await api.detached_window_ready(state.windowMode);
          } catch (_error) {
            // Ignore backend notification errors; window still renders locally.
          }
          return;
        }
        await new Promise((resolve) => setTimeout(resolve, 20));
      }
    }

    window.addEventListener('load', () => {
      void notifyBackendReady();
    });

    // Browser-open fallback so manual preview tabs can detect readiness too.
    window.opener?.postMessage({ type: 'detached-window-ready', mode: state.windowMode }, '*');
  </script>
</body>
</html>
