<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Realtime UI VNext Prototype</title>
  <link rel="stylesheet" href="./design-realtime-vnext.css" />
</head>
<body>
  <div class="vnext-shell">
    <aside class="vnext-sidebar" aria-label="Prototype navigation">
      <div class="brand-mark">
        <span class="brand-dot" aria-hidden="true"></span>
        <span>Speech Translate</span>
      </div>
      <nav class="nav-stack">
        <button class="nav-item is-active" type="button"><span class="nav-icon icon-message"></span><span>实时转写</span></button>
        <button class="nav-item" type="button"><span class="nav-icon icon-file"></span><span>文件转写</span></button>
        <button class="nav-item" type="button"><span class="nav-icon icon-box"></span><span>模型选择</span></button>
        <button class="nav-item" type="button"><span class="nav-icon icon-settings"></span><span>设置</span></button>
      </nav>
      <div class="nav-tools">
        <button class="side-action" type="button" title="模型目录" aria-label="模型目录"><span class="mini-icon icon-folder"></span></button>
        <button class="side-action" type="button" title="导出目录" aria-label="导出目录"><span class="mini-icon icon-folder"></span></button>
        <button class="side-action" type="button" title="退出程序" aria-label="退出程序"><span class="mini-icon icon-x"></span></button>
      </div>
    </aside>

    <main class="vnext-content" aria-label="Realtime prototype">
      <section class="frame frame-main" id="frame-main" aria-label="主工作区">
        <header class="work-header">
          <div>
            <h1>实时转写</h1>
          </div>
          <div class="header-actions" aria-label="独立窗口快捷入口">
            <button class="icon-action" type="button" title="打开转写窗口" aria-label="打开转写窗口"><span class="icon icon-caption"></span></button>
            <button class="icon-action" type="button" title="打开翻译窗口" aria-label="打开翻译窗口"><span class="icon icon-translate"></span></button>
          </div>
        </header>

        <section class="surface-panel hero-panel">
          <div class="realtime-toolbar" aria-label="实时控制">
            <button class="record-action" type="button">
              <span class="record-dot" aria-hidden="true"></span>
              <span>开始录制</span>
            </button>
            <div class="mode-toggles" aria-label="输出开关">
              <label class="switch-control"><input type="checkbox" checked /><span></span><b>转写</b></label>
              <label class="switch-control"><input type="checkbox" checked /><span></span><b>翻译</b></label>
            </div>
            <div class="audio-meter" aria-label="输入电平">
              <div class="meter-label">
                <span>音量</span>
                <strong>- dB</strong>
              </div>
              <div class="meter-track">
                <div class="meter-fill"></div>
                <i class="meter-pin"></i>
              </div>
            </div>
          </div>

          <div class="status-strip" aria-label="运行状态">
            <span class="status-chip status-chip-strong"><i></i>空闲</span>
            <span class="status-chip"><small>模型</small> small · faster-whisper</span>
            <span class="status-chip"><small>语言</small> Japanese → Chinese</span>
            <span class="status-chip"><small>录制</small> 00:00:00</span>
            <span class="status-chip"><small>缓冲</small> 0/0 sec · 0 句</span>
            <span class="status-chip"><small>输入</small> speaker</span>
          </div>

          <div class="output-grid" aria-label="实时输出">
            <article class="output-panel">
              <div class="output-head">
                <h2>转写</h2>
              </div>
              <div class="output-body">
                <p class="empty-note">等待输入</p>
              </div>
            </article>
            <article class="output-panel">
              <div class="output-head">
                <h2>翻译</h2>
              </div>
              <div class="output-body">
                <p class="empty-note">等待输出</p>
              </div>
            </article>
          </div>
        </section>

      </section>

      <section class="frame frame-config" id="frame-config" aria-label="快速配置">
        <div class="frame-grid">
          <section class="surface-panel config-panel">
            <header class="panel-head">
              <div>
                <h2>设备配置</h2>
              </div>
              <div class="icon-row">
                <button class="icon-action" type="button" title="刷新设备" aria-label="刷新设备"><span class="icon icon-refresh"></span></button>
                <button class="icon-action" type="button" title="保存设备配置" aria-label="保存设备配置"><span class="icon icon-save"></span></button>
              </div>
            </header>
            <div class="field-grid two-col">
              <label class="field"><span>输入</span><div class="select-like">speaker<i></i></div></label>
              <label class="field"><span>主机 API</span><div class="select-like">Windows WASAPI<i></i></div></label>
              <label class="field"><span>麦克风</span><div class="select-like">[ID: 2,5] Mi Monitor ...<i></i></div></label>
              <label class="field"><span>扬声器</span><div class="select-like">[ID: 2,2] Realtek Digi...<i></i></div></label>
            </div>
          </section>

          <section class="surface-panel config-panel">
            <header class="panel-head">
              <div>
                <h2>语言配置</h2>
              </div>
              <button class="icon-action" type="button" title="保存语言配置" aria-label="保存语言配置"><span class="icon icon-save"></span></button>
            </header>
            <div class="field-grid language-grid">
              <label class="field"><span>源语言</span><div class="select-like">japanese<i></i></div></label>
              <label class="field"><span>目标语言</span><div class="select-like">Chinese (simplified)<i></i></div></label>
              <label class="field span-2"><span>翻译引擎</span><div class="select-like">Selenium Chrome Translate<i></i></div></label>
            </div>
          </section>
        </div>
      </section>

      <section class="frame frame-detached" id="frame-detached" aria-label="独立窗口">
        <section class="surface-panel detached-workbench">
          <header class="panel-head detached-head">
            <div>
              <h2>独立窗口</h2>
            </div>
          </header>
          <div class="detached-grid">
            <article class="detached-card">
              <div class="detached-card-head">
                <div>
                  <h3>转写窗口 <span>TC</span></h3>
                  <p><i></i>未打开 · 置顶 · 可交互</p>
                </div>
                <div class="icon-row">
                  <button class="icon-action icon-action-primary" type="button" title="打开窗口" aria-label="打开转写窗口"><span class="icon icon-window"></span></button>
                  <button class="icon-action" type="button" title="设置" aria-label="转写窗口设置"><span class="icon icon-settings"></span></button>
                </div>
              </div>
              <div class="detached-control-grid">
                <label class="field"><span>尺寸</span><div class="input-like">900x240</div></label>
                <label class="field"><span>位置</span><div class="input-like">855,445</div></label>
                <label class="field"><span>透明度</span><div class="range-like"><b style="width:92%"></b><i></i></div></label>
                <label class="field"><span>字体</span><div class="select-like">Arial<i></i></div></label>
                <label class="field"><span>字号</span><div class="input-like">13</div></label>
                <label class="field"><span>字色</span><div class="input-like">#FFFFFF</div></label>
                <label class="field"><span>背景</span><div class="input-like">#000000</div></label>
                <label class="field"><span>最大字符</span><div class="input-like">120</div></label>
                <label class="field"><span>每行长度</span><div class="input-like">30</div></label>
                <label class="field"><span>限制策略</span><div class="input-like">关闭</div></label>
              </div>
              <div class="detached-toggle-grid">
                <label class="switch-control"><input type="checkbox" checked /><span></span><b>置顶</b></label>
                <label class="switch-control"><input type="checkbox" checked /><span></span><b>无标题栏</b></label>
                <label class="switch-control"><input type="checkbox" /><span></span><b>点击穿透</b></label>
                <label class="switch-control"><input type="checkbox" checked /><span></span><b>置信度颜色</b></label>
                <label class="switch-control"><input type="checkbox" checked /><span></span><b>自动滚动</b></label>
                <label class="switch-control"><input type="checkbox" checked /><span></span><b>粗体</b></label>
                <label class="switch-control"><input type="checkbox" /><span></span><b>限制字符</b></label>
                <label class="switch-control"><input type="checkbox" /><span></span><b>限制每行</b></label>
              </div>
            </article>
            <article class="detached-card">
              <div class="detached-card-head">
                <div>
                  <h3>翻译窗口 <span>TL</span></h3>
                  <p><i></i>未打开 · 置顶 · 可交互</p>
                </div>
                <div class="icon-row">
                  <button class="icon-action icon-action-primary" type="button" title="打开窗口" aria-label="打开翻译窗口"><span class="icon icon-window"></span></button>
                  <button class="icon-action" type="button" title="设置" aria-label="翻译窗口设置"><span class="icon icon-settings"></span></button>
                </div>
              </div>
              <div class="detached-control-grid">
                <label class="field"><span>尺寸</span><div class="input-like">900x240</div></label>
                <label class="field"><span>位置</span><div class="input-like">489,188</div></label>
                <label class="field"><span>透明度</span><div class="range-like"><b style="width:92%"></b><i></i></div></label>
                <label class="field"><span>字体</span><div class="select-like">Arial<i></i></div></label>
                <label class="field"><span>字号</span><div class="input-like">13</div></label>
                <label class="field"><span>字色</span><div class="input-like">#FFFFFF</div></label>
                <label class="field"><span>背景</span><div class="input-like">#000000</div></label>
                <label class="field"><span>最大字符</span><div class="input-like">120</div></label>
                <label class="field"><span>每行长度</span><div class="input-like">30</div></label>
                <label class="field"><span>限制策略</span><div class="input-like">关闭</div></label>
              </div>
              <div class="detached-toggle-grid">
                <label class="switch-control"><input type="checkbox" checked /><span></span><b>置顶</b></label>
                <label class="switch-control"><input type="checkbox" checked /><span></span><b>无标题栏</b></label>
                <label class="switch-control"><input type="checkbox" /><span></span><b>点击穿透</b></label>
                <label class="switch-control"><input type="checkbox" checked /><span></span><b>置信度颜色</b></label>
                <label class="switch-control"><input type="checkbox" checked /><span></span><b>自动滚动</b></label>
                <label class="switch-control"><input type="checkbox" checked /><span></span><b>粗体</b></label>
                <label class="switch-control"><input type="checkbox" /><span></span><b>限制字符</b></label>
                <label class="switch-control"><input type="checkbox" /><span></span><b>限制每行</b></label>
              </div>
            </article>
          </div>
        </section>
      </section>

      <div class="scroll-end-spacer" aria-hidden="true"></div>
    </main>
  </div>
</body>
</html>
