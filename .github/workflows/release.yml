name: Release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag to upload assets to
        required: false
        type: string
  release:
    types: [published]

permissions:
  contents: write

jobs:
  windows:
    name: Build Windows release
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          submodules: recursive

      - name: Set up Python 3.14
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"

      - name: Create .venv314
        run: |
          python -m venv .venv314
          .\.venv314\Scripts\python.exe -m pip install --upgrade pip
          .\.venv314\Scripts\python.exe -m pip install -r requirements-dev.txt

      - name: Smoke test source recording imports
        run: .\.venv314\Scripts\python.exe -m speech_translate --smoke-test-recording-imports

      - name: Build executable
        run: .\.venv314\Scripts\python.exe build_windows.py build_exe

      - name: Verify frozen recording modules
        shell: pwsh
        run: |
          $version = .\.venv314\Scripts\python.exe -c "from speech_translate._version import __version__; print(__version__)"
          $buildRoot = "build\SpeechTranslateRev $version .venv314"
          .\.venv314\Scripts\python.exe scripts\verify_frozen_recording_modules.py "$buildRoot"

      - name: Package portable archive
        shell: pwsh
        run: |
          $version = .\.venv314\Scripts\python.exe -c "from speech_translate._version import __version__; print(__version__)"
          $buildDir = "build\SpeechTranslateRev $version .venv314"
          if (-not (Test-Path -LiteralPath $buildDir)) {
            throw "Build directory not found: $buildDir"
          }
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          $zipPath = "dist\SpeechTranslateRev-$version-windows-x64-portable.zip"
          Compress-Archive -Path "$buildDir\*" -DestinationPath $zipPath -Force

          [Int64]$maxPartBytes = 1900L * 1024L * 1024L
          $zipItem = Get-Item -LiteralPath $zipPath
          if ($zipItem.Length -gt $maxPartBytes) {
            $buffer = New-Object byte[] (8MB)
            $inputStream = [System.IO.File]::OpenRead($zipPath)
            try {
              $part = 1
              while ($inputStream.Position -lt $inputStream.Length) {
                $partPath = "{0}.{1:D3}" -f $zipPath, $part
                $outputStream = [System.IO.File]::Create($partPath)
                try {
                  [Int64]$remainingTotal = $inputStream.Length - $inputStream.Position
                  [Int64]$remaining = [Math]::Min($maxPartBytes, $remainingTotal)
                  while ($remaining -gt 0) {
                    [Int32]$readSize = [Math]::Min([Int64]$buffer.Length, $remaining)
                    $read = $inputStream.Read($buffer, 0, $readSize)
                    if ($read -le 0) { break }
                    $outputStream.Write($buffer, 0, $read)
                    $remaining -= $read
                  }
                } finally {
                  $outputStream.Dispose()
                }
                $part += 1
              }
            } finally {
              $inputStream.Dispose()
            }
            Remove-Item -LiteralPath $zipPath -Force
          }

      - name: Build installer
        shell: pwsh
        run: |
          choco install innosetup --no-progress -y
          $version = .\.venv314\Scripts\python.exe -c "from speech_translate._version import __version__; print(__version__)"
          $iscc = "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe"
          if (-not (Test-Path -LiteralPath $iscc)) {
            throw "ISCC.exe not found: $iscc"
          }
          & $iscc "/DMyAppVersion=$version" "/DEnvName= .venv314" installer.iss
          $installer = "dist\SpeechTranslateRev.exe"
          if (-not (Test-Path -LiteralPath $installer)) {
            throw "Installer not found: $installer"
          }
          $target = "dist\SpeechTranslateRev-$version-windows-x64-setup.exe"
          Move-Item -Force -LiteralPath $installer -Destination $target
          "INSTALLER_PATH=$target" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Create checksums
        shell: pwsh
        run: |
          Get-ChildItem -LiteralPath dist -File |
            Sort-Object Name |
            Get-FileHash -Algorithm SHA256 |
            ForEach-Object { "$($_.Hash.ToLower())  $(Split-Path $_.Path -Leaf)" } |
            Set-Content -LiteralPath dist\SHA256SUMS.txt -Encoding utf8

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v7
        with:
          name: speech-translate-rev-windows
          path: |
            dist/SpeechTranslateRev-*
            dist/SHA256SUMS.txt
          if-no-files-found: error

      - name: Upload release assets
        if: github.event_name == 'release' || inputs.tag != ''
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $tag = "${{ github.event.release.tag_name }}"
          if ([string]::IsNullOrWhiteSpace($tag)) {
            $tag = "${{ inputs.tag }}"
          }
          if ([string]::IsNullOrWhiteSpace($tag)) {
            throw "No release tag provided."
          }
          $version = .\.venv314\Scripts\python.exe -c "from speech_translate._version import __version__; print(__version__)"
          $assets = Get-ChildItem -LiteralPath dist -File | Where-Object {
            $_.Name -like "SpeechTranslateRev-$version-windows-x64*" -or $_.Name -eq "SHA256SUMS.txt"
          }
          if (-not $assets) {
            throw "No release assets found."
          }
          gh release upload $tag @($assets.FullName) --repo $env:GITHUB_REPOSITORY --clobber
